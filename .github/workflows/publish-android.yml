# Build the release .so for all ABIs and publish the :rustplayer AAR to GitHub
# Packages (cz.preclikos:rustplayer:<version>). Consumers then add it as a plain
# Gradle dependency — no NDK / cargo / Rust on their side.
#
# Trigger: push a tag `android-v1.2.3`, or run manually with an explicit version.
#
# NOTE: not yet run in CI — the Android FFmpeg vendored build (via
# ffmpeg-sys-next during cargo-ndk) may need extra apt packages; tune on first run.
name: Publish Android AAR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "rustplayer version (e.g. 0.1.0)"
        required: true
  push:
    tags: ["android-v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Toolchain deps (FFmpeg vendored build)
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev nasm pkg-config

      - name: Rust + Android targets + cargo-ndk
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android
          cargo install cargo-ndk --locked

      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;29.0.13113456"

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#android-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .so (all ABIs, release) + publish AAR
        working-directory: app-android/android
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.13113456
        # :rustplayer:publish → preReleaseBuild → buildRustRelease + copyLibCxxShared.
        run: ./gradlew :rustplayer:publish -Prustplayer.version=${{ steps.ver.outputs.version }} --no-daemon --stacktrace

# Build the release .so for all ABIs and publish the :rustplayer AAR to GitHub
# Packages (cz.preclikos:rustplayer:<version>). Consumers then add it as a plain
# Gradle dependency — no NDK / cargo / Rust on their side.
#
# Runs on the self-hosted Linux runner ("makak"). JDK + Android SDK are
# provisioned per-job via setup-java / setup-android (same as BlackZoneAndroid);
# the NDK + Rust toolchain are added on top for our cargo-ndk cdylib build.
# Trigger: push a tag `android-v1.2.3`, or run manually with an explicit version.
name: Publish Android AAR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "rustplayer version (e.g. 0.0.1)"
        required: true
  push:
    tags: ["android-v*"]

jobs:
  publish:
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;29.0.13113456"

      - name: Ensure Rust Android targets + cargo-ndk
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android
          command -v cargo-ndk >/dev/null || cargo install cargo-ndk --locked

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#android-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .so (all ABIs, release) + publish AAR
        working-directory: platform/android/android
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # :rustplayer:publish → preReleaseBuild → buildRustRelease + copyLibCxxShared.
        # The buildRust task resolves the NDK from the SDK (ndk;29.0.13113456).
        run: bash ./gradlew :rustplayer:publish -Prustplayer.version=${{ steps.ver.outputs.version }} --no-daemon --stacktrace

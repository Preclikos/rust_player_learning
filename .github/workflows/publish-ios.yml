# Build RustPlayerFFI.xcframework (device + simulator, Rust player + FFmpeg) on
# a macOS runner and attach the zip + its SwiftPM checksum to a GitHub Release.
# Consumers point the SwiftPM `binaryTarget` at the release zip + checksum — no
# Rust toolchain on their side.
#
# Trigger: push a tag `ios-v1.2.3`, or run manually.
#
# NOTE: not yet run in CI — first run on a Mac will confirm the FFmpeg merge +
# the Package.swift link set. See app-ios/packaging/README.md.
name: Publish iOS XCFramework

on:
  workflow_dispatch:
  push:
    tags: ["ios-v*"]

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write   # attach asset to the release
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer

      - name: Rust + iOS targets
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Build XCFramework
        run: bash app-ios/packaging/scripts/build_xcframework.sh

      - name: Compute checksum
        id: cs
        working-directory: app-ios/packaging
        run: echo "checksum=$(swift package compute-checksum RustPlayerFFI.xcframework.zip)" >> "$GITHUB_OUTPUT"

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app-ios/packaging/RustPlayerFFI.xcframework.zip
          body: |
            `RustPlayerFFI.xcframework` — set the SwiftPM `binaryTarget`:
            ```
            url:      <this release asset URL>
            checksum: ${{ steps.cs.outputs.checksum }}
            ```
